# alembic.ini – Configuração do Alembic para o projeto SAA29

[alembic]
# Caminho para os scripts de migração
script_location = migrations

# Template para nomes de arquivos de revisão
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# A connection string será lida de DATABASE_URL no .env (via env.py)
# Valor abaixo é fallback — env.py sobrescreve com get_settings().database_url
sqlalchemy.url = sqlite:///./saa29_local.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
