services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - uploads_data:/app/uploads
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/saa29.db
    restart: always

volumes:
  uploads_data:
  sqlite_data:
