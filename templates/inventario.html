{% extends "base.html" %}

{% block page_title %}Inventário de Equipamentos{% endblock %}

{% block content %}
<style>
    .real-input-container {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }

    .real-input {
        flex: 1;
        padding: 0.5rem;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-secondary);
        color: var(--text-primary);
        font-family: monospace;
        transition: all 0.2s;
        min-width: 140px;
    }

    .real-input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.2);
    }

    .status-match {
        border-color: var(--status-success) !important;
        background-color: rgba(34, 197, 94, 0.1) !important;
        color: var(--status-success) !important;
    }

    .status-mismatch {
        border-color: var(--status-danger) !important;
        background-color: rgba(239, 68, 68, 0.1) !important;
        color: var(--status-danger) !important;
    }

    .status-pending {
        border-color: #eab308 !important;
        background-color: rgba(234, 179, 8, 0.1) !important;
    }

    .btn-sync {
        padding: 0.5rem;
        border-radius: 4px;
        background: var(--primary-color);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
        opacity: 0;
        pointer-events: none;
    }

    .btn-sync.visible {
        opacity: 1;
        pointer-events: auto;
    }

    .btn-sync:hover {
        filter: brightness(1.1);
    }

    /* Modal Customizado */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal-content {
        max-width: 500px;
        width: 90%;
        padding: 2rem;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }

    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-top: 2rem;
    }
</style>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div style="display: flex; gap: 1rem; flex: 1; max-width: 600px;">
            <select id="aeronave-select" class="form-input" style="flex: 1;" onchange="loadInventario()">
                <option value="">Selecione uma aeronave...</option>
            </select>
            <input type="text" id="filter-nome" class="form-input" placeholder="Filtrar por equipamento..."
                style="flex: 1;" oninput="loadInventario()">
        </div>
        <div id="stats-summary" style="display: flex; gap: 1.5rem; font-size: 0.9rem; font-weight: 500;">
            <!-- Estatísticas via JS -->
        </div>
    </div>

    <div id="inventario-container">
        <!-- Conteúdo dinâmico (Tabela de Inventário ou Histórico Recente) -->
    </div>
</div>

<!-- Modal de Confirmação de Transferência -->
<div id="modal-transferencia" class="modal-overlay">
    <div class="modal-content card glass-panel">
        <div style="display: flex; align-items: center; gap: 1rem; color: var(--status-danger); margin-bottom: 1rem;">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
            <h3 style="margin: 0;">Conflito de Instalação</h3>
        </div>
        <p id="modal-transferencia-msg" style="line-height: 1.6; color: var(--text-primary);"></p>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Deseja remover o item da aeronave anterior e
            transferi-lo para a aeronave atual?</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-primary" id="btn-confirmar-transferencia"
                style="background-color: var(--status-danger); border-color: var(--status-danger);">Transferir
                S/N</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadAeronaves() {
        const select = document.getElementById('aeronave-select');
        try {
            const data = await apiFetch('/aeronaves/?limit=100');
            data.sort((a, b) => a.matricula.localeCompare(b.matricula));
            data.forEach(acft => {
                const opt = document.createElement('option');
                opt.value = acft.id;
                opt.textContent = acft.matricula;
                select.appendChild(opt);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const acftId = urlParams.get('aeronave_id');
            if (acftId) {
                select.value = acftId;
                loadInventario();
            } else {
                loadHistoricoRecente();
            }
        } catch (e) { console.error(e); }
    }

    async function loadInventario() {
        const aeronaveId = document.getElementById('aeronave-select').value;
        const nomeFilter = document.getElementById('filter-nome').value;
        const container = document.getElementById('inventario-container');

        if (!aeronaveId) {
            loadHistoricoRecente();
            return;
        }

        try {
            let url = `/equipamentos/inventario/${aeronaveId}`;
            if (nomeFilter) url += `?nome=${encodeURIComponent(nomeFilter)}`;

            const data = await apiFetch(url);
            renderInventario(data);
            updateStats(data);
        } catch (e) {
            container.innerHTML = `<div class="card glass-panel" style="padding: 2rem; text-align: center; color: var(--status-danger);">Erro ao carregar inventário.</div>`;
        }
    }

    async function loadHistoricoRecente() {
        const container = document.getElementById('inventario-container');
        const statsDiv = document.getElementById('stats-summary');
        statsDiv.innerHTML = '';
        
        try {
            const data = await apiFetch('/equipamentos/inventario/historico');
            renderHistorico(data);
        } catch (e) {
            container.innerHTML = `<div class="card glass-panel" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Selecione uma aeronave para começar.</div>`;
        }
    }

    function renderHistorico(logs) {
        const container = document.getElementById('inventario-container');
        
        let html = `
            <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--primary-color);">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h3 style="margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">Últimas Alterações no Inventário</h3>
            </div>
            <div class="card glass-panel" style="padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: center;">
                    <thead style="background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border-color);">
                        <tr>
                            <th style="padding: 1rem; width: 15%;">Data/Hora</th>
                            <th style="padding: 1rem; width: 10%;">Aeronave</th>
                            <th style="padding: 1rem; width: 15%;">Posição</th>
                            <th style="padding: 1rem; width: 25%;">S/N Instalado</th>
                            <th style="padding: 1rem; width: 10%;">Trigrama</th>
                            <th style="padding: 1rem; width: 15%;">Ação</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        if (!logs || logs.length === 0) {
            html += `<tr><td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nenhuma movimentação registrada recentemente.</td></tr>`;
        } else {
            logs.forEach(log => {
                const dataFormatada = new Date(log.created_at).toLocaleString('pt-BR');
                html += `
                    <tr style="border-bottom: 1px solid var(--border-color);">
                        <td style="padding: 0.8rem 1rem; font-size: 0.85rem; color: var(--text-secondary);">${dataFormatada}</td>
                        <td style="padding: 0.8rem 1rem; font-weight: 700; color: var(--primary-color);">${log.aeronave_matricula}</td>
                        <td style="padding: 0.8rem 1rem;">${log.slot_nome}</td>
                        <td style="padding: 0.8rem 1rem; font-family: monospace; font-weight: 500;">${log.item_sn}</td>
                        <td style="padding: 0.8rem 1rem; text-align: center;">
                            <span class="badge" style="background: var(--bg-tertiary); color: var(--text-primary); font-weight: 700;">${log.usuario_trigrama || 'SYS'}</span>
                        </td>
                        <td style="padding: 0.8rem 1rem;">
                            <span style="font-size: 0.75rem; font-weight: 700; color: var(--status-success);">● ${log.tipo_acao}</span>
                        </td>
                    </tr>
                `;
            });
        }

        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function compareSN(input, snOriginal, equipamentoId) {
        const val = input.value.trim().toUpperCase();
        const btn = document.getElementById(`btn-sync-${equipamentoId}`);
        input.classList.remove('status-match', 'status-mismatch', 'status-pending');
        const original = (snOriginal || "").toUpperCase();

        if (val === '') {
            input.classList.add('status-pending');
            btn.classList.remove('visible');
        } else if (val === original) {
            input.classList.add('status-match');
            btn.classList.remove('visible');
        } else {
            input.classList.add('status-mismatch');
            btn.classList.add('visible');
        }
        updateStats();
    }

    async function ajustarInventario(equipamentoId, snReal, forcar = false) {
        const aeronaveId = document.getElementById('aeronave-select').value;
        const user = JSON.parse(localStorage.getItem("saa29_user"));
        
        try {
            const response = await apiFetch(`/equipamentos/inventario/ajuste`, {
                method: 'POST',
                body: {
                    aeronave_id: aeronaveId,
                    equipamento_id: equipamentoId,
                    numero_serie_real: snReal,
                    forcar_transferencia: forcar,
                    usuario_id: user ? user.id : null
                }
            });

            if (response.sucesso) {
                showToast(response.mensagem, "success");
                fecharModal();
                loadInventario();
            } else if (response.requer_confirmacao) {
                abrirModal(equipamentoId, snReal, response.aeronave_conflito);
            } else {
                showToast(response.mensagem, "error");
            }
        } catch (e) {
            showToast(e.message || "Erro ao ajustar inventário.", "error");
        }
    }

    function abrirModal(equipamentoId, snReal, anvConflito) {
        document.getElementById('modal-transferencia-msg').innerHTML =
            `O item <strong>${snReal}</strong> consta como instalado na aeronave <strong>${anvConflito}</strong>.`;
        document.getElementById('modal-transferencia').style.display = 'flex';

        document.getElementById('btn-confirmar-transferencia').onclick = () => {
            ajustarInventario(equipamentoId, snReal, true);
        };
    }

    function fecharModal() {
        document.getElementById('modal-transferencia').style.display = 'none';
    }

    function updateStats(items = null) {
        const allInputs = document.querySelectorAll('.real-input');
        if (allInputs.length === 0 && !items) return;

        let total = items ? items.length : allInputs.length;
        let matches = 0;
        let mismatches = 0;
        let pending = 0;

        allInputs.forEach(input => {
            if (input.classList.contains('status-match')) matches++;
            else if (input.classList.contains('status-mismatch')) mismatches++;
            else pending++;
        });

        const statsDiv = document.getElementById('stats-summary');
        statsDiv.innerHTML = `
            <span style="color: var(--text-secondary)">Total: ${total}</span>
            <span style="color: var(--status-success)">Conferido: ${matches}</span>
            <span style="color: var(--status-danger)">Divergente: ${mismatches}</span>
            <span style="color: #eab308">Pendente: ${pending}</span>
        `;
    }

    function renderInventario(items) {
        const container = document.getElementById('inventario-container');
        if (items.length === 0) {
            container.innerHTML = `<div class="card glass-panel" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nenhum item encontrado.</div>`;
            return;
        }

        container.innerHTML = '';
        const section = document.createElement('div');
        section.className = 'inventory-section';

        let html = `
            <div class="card glass-panel" style="padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: center;">
                    <thead style="background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border-color);">
                        <tr>
                            <th style="padding: 1rem; width: 8%;">Loc.</th>
                            <th style="padding: 1rem; width: 20%;">Item</th>
                            <th style="padding: 1rem; width: 18%;">P/N</th>
                            <th style="padding: 1rem; width: 12%;">Anv Ant.</th>
                            <th style="padding: 1rem; width: 18%;">S/N (Sistema)</th>
                            <th style="padding: 1rem; width: 24%;">S/N (REAL)</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        items.sort((a, b) => {
            const sistemaA = a.sistema || 'ZZZ';
            const sistemaB = b.sistema || 'ZZZ';
            if (sistemaA !== sistemaB) return sistemaA.localeCompare(sistemaB);
            return a.equipamento_nome.localeCompare(b.equipamento_nome);
        }).forEach(item => {
            const inputId = `real-${item.equipamento_id}`;
            const anvAnt = item.aeronave_anterior ?
                `<span class="badge" style="background: var(--bg-tertiary); color: var(--primary-color);">${item.aeronave_anterior}</span>` :
                `<span style="color: var(--text-secondary); opacity: 0.5;">-</span>`;

            const snSistema = item.numero_serie || '<span style="opacity: 0.3">vazio</span>';

            html += `
                <tr style="border-bottom: 1px solid var(--border-color);">
                    <td style="padding: 0.8rem 1rem;">
                        <span class="badge" style="background: rgba(var(--primary-rgb), 0.1); color: var(--primary-color); font-weight: 600; font-size: 0.75rem;">${item.sistema || '-'}</span>
                    </td>
                    <td style="padding: 0.8rem 1rem;">
                        <div style="font-weight: 600;">${item.equipamento_nome}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);">${item.status_item || 'NÃO INSTALADO'}</div>
                    </td>
                    <td style="padding: 0.8rem 1rem; font-family: monospace; font-size: 0.9rem;">${item.part_number}</td>
                    <td style="padding: 0.8rem 1rem; text-align: center;">${anvAnt}</td>
                    <td style="padding: 0.8rem 1rem; font-family: monospace; color: var(--text-secondary);">${snSistema}</td>
                    <td style="padding: 0.6rem 1rem;">
                        <div class="real-input-container">
                            <input type="text" id="${inputId}" class="real-input status-pending" 
                                   placeholder="S/N real..." 
                                   oninput="compareSN(this, '${item.numero_serie || ''}', '${item.equipamento_id}')">
                            <button id="btn-sync-${item.equipamento_id}" class="btn-sync" 
                                    onclick="ajustarInventario('${item.equipamento_id}', document.getElementById('${inputId}').value)"
                                    title="Sincronizar com Sistema">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table></div>`;
        section.innerHTML = html;
        container.appendChild(section);
        updateStats();
    }

    document.addEventListener('DOMContentLoaded', loadAeronaves);
</script>
{% endblock %}
