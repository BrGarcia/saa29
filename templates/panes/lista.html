{% extends "base.html" %}

{% block page_title %}PANES{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <!-- Barra de Filtros Rápida -->
    <div style="display: flex; gap: 1rem; flex: 1; max-width: 700px;">
        <input type="text" id="filter-text" class="form-input" placeholder="Buscar por texto na descrição..." style="flex: 1;">
        <select id="filter-status" class="form-input" style="width: auto;">
            <option value="">TODOS STATUS</option>
            <option value="ABERTA">ABERTA</option>
            <option value="RESOLVIDA">RESOLVIDA</option>
            <option value="EXCLUIDAS">EXCLUIDAS (Lixeira)</option>
        </select>
    </div>

    <!-- Nova Pane -->
    <button class="btn btn-primary" onclick="openNuevaPaneModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
        Registrar Pane
    </button>
</div>

<!-- Tabela de Panes -->
<div class="card glass-panel" style="padding: 0;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead style="background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border-color);">
            <tr>
                <th style="padding: 1rem; font-weight: 600;">Code</th>
                <th style="padding: 1rem; font-weight: 600;">Data/Hora</th>
                <th style="padding: 1rem; font-weight: 600;">Aeronave</th>
                <th style="padding: 1rem; font-weight: 600;">Pane</th>
                <th style="padding: 1rem; font-weight: 600;">Status</th>
                <th style="padding: 1rem; font-weight: 600;">Responsavel</th>
                <th style="padding: 1rem; font-weight: 600; text-align: center;">Ação</th>
            </tr>
        </thead>
        <tbody id="panes-table-body">
            <tr><td colspan="7" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Recuperando telemetria...</td></tr>
        </tbody>
    </table>
</div>

<!-- Custom Modal para Nova Pane (Escondido initially) -->
<div id="modal-nova-pane" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 500px; margin: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Nova Ocorrência</h3>
            <button class="btn-icon" onclick="closeNovaPaneModal()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <form id="formNovaPane" onsubmit="handleCriarPane(event)">
            <div class="form-group">
                <label class="form-label">Aeronave (Matrícula) *</label>
                <select id="aeronaveSelect" name="aeronave_id" class="form-input" required>
                    <option value="">Carregando frota...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Sistema / ATA (Opcional)</label>
                <input type="text" id="sistemaInput" name="sistema_subsistema" class="form-input" placeholder="Se souber, digite o sistema...">
            </div>

            <div class="form-group">
                <label class="form-label">Sintoma Constatado (Opcional)</label>
                <textarea id="descricaoInput" name="descricao" class="form-input" rows="3" placeholder="Detalhes do problema reportado..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Responsável (Opcional)</label>
                <select id="mantenedorResponsavelSelect" name="mantenedor_responsavel_id" class="form-input">
                    <option value="">-- Não atribuir responsável --</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Evidência / Fotografia Inicial (Opcional)</label>
                <input type="file" id="fotoInput" name="arquivo" class="form-input" accept="image/*">
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" onclick="closeNovaPaneModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btnSalvarPane">Cadastrar Pane</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Carregamento de Panes
    async function loadPanes() {
        const body = document.getElementById('panes-table-body');
        const txt = document.getElementById('filter-text').value;
        const sts = document.getElementById('filter-status').value;
        const aeronaveId = new URLSearchParams(window.location.search).get('aeronave_id');

        let query = `/panes/?limit=50`;
        if (txt) query += `&texto=${encodeURIComponent(txt)}`;
        if (aeronaveId) query += `&aeronave_id=${encodeURIComponent(aeronaveId)}`;
        
        if (sts === 'EXCLUIDAS') {
            query += `&excluidas=true`;
        } else if (sts) {
            query += `&status=${sts}`;
        }

        try {
            const panes = await apiFetch(query);
            body.innerHTML = '';
            
            const user = JSON.parse(localStorage.getItem("saa29_user") || '{}');
            const funcao = user.funcao || '';

            if (panes.length === 0) {
                body.innerHTML = `<tr><td colspan="7" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nenhum registro encontrado.</td></tr>`;
                return;
            }

            panes.forEach(pane => {
                let badgeClass = "badge-aberta";
                if(pane.status === "RESOLVIDA") badgeClass = "badge-resolvida";
                if(!pane.ativo) badgeClass = "badge-resolvida"; // Fallback color for deleted (gray/black maybe, depending on CSS)
                
                // Tratar data e hora e formato ddd/yy
                const rawDate = pane.data_abertura ? pane.data_abertura : new Date().toISOString();
                const dObj = new Date(rawDate);
                const shortDate = dObj.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
                
                const paneCode = pane.codigo || "---/--";
                const obsConclusao = pane.observacao_conclusao || "Sem ação corretiva registrada.";
                const statusName = pane.ativo ? pane.status.replace("_", " ") : "EXCLUIDA";
                const matriculaAeronave = pane.aeronave?.matricula || "59XX";
                const responsavelMantenedor = (pane.responsaveis || []).find(r => r.papel === "MANTENEDOR");
                const responsavelFallback = (pane.responsaveis || []).find(r => r.trigrama);
                const responsavelTrigrama = responsavelMantenedor?.trigrama || responsavelFallback?.trigrama || "--";
                const responsavelBadge = responsavelTrigrama === "--"
                    ? "--"
                    : `<span class="badge" style="background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-color); font-family: monospace; font-size: 0.75rem;">${responsavelTrigrama}</span>`;
                
                // Apenas Encarregado e Administrador podem Editar e Apagar
                const showAdminActions = (funcao === 'ENCARREGADO' || funcao === 'ADMINISTRADOR');

                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid var(--border-color)";
                tr.innerHTML = `
                    <td style="padding: 1rem; font-family: monospace; font-size: 0.85rem;">${paneCode}</td>
                    <td style="padding: 1rem; font-size: 0.85rem; color: var(--text-secondary);">${shortDate}</td>
                    <td style="padding: 1rem; font-weight: 500;">${matriculaAeronave}</td>
                    <td style="padding: 1rem; max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${pane.descricao}</td>
                    <td style="padding: 1rem;"><span class="badge ${badgeClass}" title="${obsConclusao.replace(/"/g, '&quot;')}">${statusName}</span></td>
                    <td style="padding: 1rem; color: var(--text-secondary); font-size: 0.85rem;">${responsavelBadge}</td>
                    <td style="padding: 1rem; text-align: center; display: flex; gap: 0.5rem; justify-content: center;">
                        <a href="/panes/${pane.id}/detalhes" class="btn-icon" style="color: var(--primary-color); display: flex; justify-content: center; align-items: center; cursor: pointer; background: transparent; border: none; padding: 0.25rem;" title="Visualizar">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </a>
                        ${showAdminActions && pane.ativo ? `<a href="/panes/${pane.id}/detalhes?edit=true" class="btn-icon" style="color: var(--status-warning); display: flex; justify-content: center; align-items: center; cursor: pointer; background: transparent; border: none; padding: 0.25rem;" title="Editar"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg></a><button class="btn-icon" style="color: var(--status-danger); display: flex; justify-content: center; align-items: center; cursor: pointer; background: transparent; border: none; padding: 0.25rem;" title="Excluir" onclick="softDeletePane('${pane.id}')"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>` : ''}
                        ${showAdminActions && !pane.ativo ? `<button class="btn-icon" style="color: var(--status-ok); display: flex; justify-content: center; align-items: center; cursor: pointer; background: transparent; border: none; padding: 0.25rem;" title="Restaurar" onclick="restorePane('${pane.id}')"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button>` : ''}
                    </td>
                `;
                body.appendChild(tr);
            });
        } catch (e) {
            console.error(e);
            body.innerHTML = `<tr><td colspan="7" style="padding: 2rem; text-align: center; color: var(--status-danger);">Falha de Comunicação ao extrair telemetria!</td></tr>`;
        }
    }

    // Modal Nova Pane
    const modal = document.getElementById('modal-nova-pane');
    const aeronaveSelect = document.getElementById('aeronaveSelect');
    const mantenedorResponsavelSelect = document.getElementById('mantenedorResponsavelSelect');
    
    async function openNuevaPaneModal() {
        modal.style.display = 'flex';
        // Hydrate aeronaves combo box
        try {
            const frota = await apiFetch("/aeronaves/?limit=100");
            aeronaveSelect.innerHTML = `<option value="">-- Selecionar Aeronave --</option>`;
            frota.forEach(f => {
                const opt = document.createElement("option");
                opt.value = f.id;
                opt.innerText = `${f.matricula} (S/N: ${f.serial_number})`;
                aeronaveSelect.appendChild(opt);
            });
        } catch(e) { console.error(e) }

        try {
            const usuarios = await apiFetch("/auth/usuarios");
            const responsaveisPermitidos = usuarios.filter(u => ["MANTENEDOR", "ENCARREGADO"].includes(u.funcao));
            mantenedorResponsavelSelect.innerHTML = `<option value="">-- Não atribuir responsável --</option>`;
            responsaveisPermitidos.forEach(u => {
                const opt = document.createElement("option");
                opt.value = u.id;
                const designacao = [u.posto, u.nome].filter(Boolean).join(" ");
                const detalhe = u.trigrama ? ` - ${u.trigrama}` : "";
                opt.innerText = `${designacao}${detalhe}`;
                mantenedorResponsavelSelect.appendChild(opt);
            });
        } catch(e) { console.error(e) }
    }

    function closeNovaPaneModal() {
        modal.style.display = 'none';
        document.getElementById('formNovaPane').reset();
    }

    async function handleCriarPane(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvarPane');
        btn.disabled = true;
        btn.innerText = "Registrando...";

        let sistema = document.getElementById('sistemaInput').value.trim();
        let descricao = document.getElementById('descricaoInput').value.trim();
        if(!sistema) sistema = "A ser definido";
        if(!descricao) descricao = "Aguardando relato.";

        const payload = {
            aeronave_id: aeronaveSelect.value,
            sistema_subsistema: sistema,
            descricao: descricao
        };
        if (mantenedorResponsavelSelect.value) {
            payload.mantenedor_responsavel_id = mantenedorResponsavelSelect.value;
        }

        try {
            const pane = await apiFetch("/panes/", {
                method: "POST",
                body: payload
            });
            
            // Upload Foto se existir
            const fileInput = document.getElementById('fotoInput');
            if(fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append("arquivo", fileInput.files[0]);
                const token = getToken();
                await fetch(`/panes/${pane.id}/anexos`, {
                    method: "POST",
                    body: formData,
                    headers: { "Authorization": `Bearer ${token}` }
                });
            }

            showToast("Relato de Pane Registrado!", "success");
            closeNovaPaneModal();
            loadPanes();
        } catch(err) {
            // Toast já mostrado via apiFetch
        } finally {
            btn.disabled = false;
            btn.innerText = "Cadastrar Pane";
        }
    }

    async function softDeletePane(id) {
        if(!confirm("Atenção: A pane será inativada e constará na lixeira de Excluídas. Deseja prosseguir?")) return;
        try {
            await apiFetch(`/panes/${id}`, { method: 'DELETE' });
            showToast("Pane removida com sucesso.", "success");
            loadPanes();
        } catch(e) {}
    }

    async function restorePane(id) {
        if(!confirm("Deseja restaurar esta pane para o estado ativo?")) return;
        try {
            await apiFetch(`/panes/${id}/restaurar`, { method: 'POST' });
            showToast("Pane restaurada com sucesso.", "success");
            loadPanes();
        } catch(e) {}
    }

    async function editPane(id) {
        // Redireciona para o detalhe para edicao. Caso a UI de editar seja um modal em Lista, seria customizado aqui.
        // A pagina View (Analisar/Detail) ja prove edicoes e mudancas de status.
        window.location.href = `/panes/${id}/detalhes`;
    }

    // Init
    document.addEventListener("DOMContentLoaded", () => {
        const filterText = document.getElementById('filter-text');
        const filterStatus = document.getElementById('filter-status');
        let filtroTimeout;

        filterText.addEventListener("input", () => {
            clearTimeout(filtroTimeout);
            filtroTimeout = setTimeout(loadPanes, 250);
        });
        filterStatus.addEventListener("change", loadPanes);

        loadPanes();
    });
</script>
{% endblock %}
