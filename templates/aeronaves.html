{% extends "base.html" %}

{% block page_title %}Controle de Frota de Voo{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <!-- Barra de Filtros Rápida -->
    <div style="display: flex; gap: 1rem; flex: 1; max-width: 600px;">
        <input type="text" id="filter-text" class="form-input" placeholder="Buscar por matrícula..." style="flex: 1;">
        <button class="btn btn-outline" onclick="loadFrota()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
    </div>

    <!-- Nova Aeronave -->
    <button class="btn btn-primary" onclick="openModalFrota()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
        Cadastrar Aeronave
    </button>
</div>

<!-- Tabela de Aeronaves -->
<div class="card glass-panel" style="padding: 0;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead style="background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border-color);">
            <tr>
                <th style="padding: 1rem; font-weight: 600;">Matrícula (Cauda)</th>
                <th style="padding: 1rem; font-weight: 600;">Número de Série</th>
                <th style="padding: 1rem; font-weight: 600;">Modelo</th>
                <th style="padding: 1rem; font-weight: 600;">Ações</th>
            </tr>
        </thead>
        <tbody id="frota-table-body">
            <tr><td colspan="4" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Recuperando dados da frota...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal para Nova Aeronave -->
<div id="modal-aeronave" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 450px; margin: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Nova Aeronave</h3>
            <button class="btn-icon" onclick="closeModalFrota()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <form id="formAeronave" onsubmit="criarAeronave(event)">
            <div class="form-group">
                <label class="form-label">Matrícula (Ex: 5700) *</label>
                <input type="text" id="matriculaInput" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Número de Série da Estrutura *</label>
                <input type="text" id="snInput" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Modelo (Padronizado)</label>
                <input type="text" id="modeloInput" class="form-input" value="A-29" required>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" onclick="closeModalFrota()">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btnSalvarAcft">Registrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadFrota() {
        const body = document.getElementById('frota-table-body');
        const search = document.getElementById('filter-text').value;

        try {
            const data = await apiFetch(`/aeronaves/?limit=100`);
            body.innerHTML = '';
            
            // local filter
            const filtered = data.filter(d => d.matricula.includes(search));

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="4" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Nenhuma aeronave encontrada.</td></tr>`;
                return;
            }

            filtered.forEach(acft => {
                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid var(--border-color)";
                tr.innerHTML = `
                    <td style="padding: 1rem; font-weight: 600; font-size: 1.1rem; color: var(--primary-color)">${acft.matricula}</td>
                    <td style="padding: 1rem;">${acft.serial_number}</td>
                    <td style="padding: 1rem;"><span class="badge" style="background-color: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color)">${acft.modelo}</span></td>
                    <td style="padding: 1rem;">
                        <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.75rem; background-color: var(--bg-secondary); color: var(--text-primary);">Ver Panes</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        } catch (e) {
            console.error(e);
            body.innerHTML = `<tr><td colspan="4" style="padding: 2rem; text-align: center; color: var(--status-danger);">Falha ao acessar registros.</td></tr>`;
        }
    }

    const modal = document.getElementById("modal-aeronave");
    function openModalFrota() { modal.style.display = "flex"; }
    function closeModalFrota() { modal.style.display = "none"; document.getElementById("formAeronave").reset(); }

    async function criarAeronave(e) {
        e.preventDefault();
        const btn = document.getElementById("btnSalvarAcft");
        btn.disabled = true;
        
        try {
            await apiFetch("/aeronaves/", {
                method: "POST",
                body: {
                    matricula: document.getElementById("matriculaInput").value,
                    serial_number: document.getElementById("snInput").value,
                    modelo: document.getElementById("modeloInput").value
                }
            });
            showToast("Aeronave baseada no esquadrão!", "success");
            closeModalFrota();
            loadFrota();
        } catch(e) {} finally {
            btn.disabled = false;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadFrota();
    });
</script>
{% endblock %}
