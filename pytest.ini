[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    asyncio: marca testes assíncronos
    unit: testes unitários sem banco de dados
    integration: testes de integração com banco de dados
