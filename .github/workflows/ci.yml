name: CI - SAA29

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: saa29_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: saa29_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://saa29_user:password123@localhost:5432/saa29_db_test
      APP_SECRET_KEY: testing_secret_key
      APP_ENV: testing

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1 libpq-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy pytest-asyncio

    - name: Lint with Ruff
      run: ruff check .

    - name: Type check with Mypy
      run: mypy .

    - name: Run Tests
      run: |
        pytest
