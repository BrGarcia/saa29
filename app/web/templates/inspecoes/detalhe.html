{% extends "base.html" %}

{% block page_title %}Detalhes da Inspeção{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; gap: 2rem;">

    <!-- Cabeçalho de Detalhes -->
    <div class="card" id="inspecao-header" style="display: flex; flex-direction: column; gap: 1rem;">
        <!-- Preenchido via JS -->
        <p style="text-align: center;">Carregando dados da inspeção...</p>
    </div>

    <!-- Tabela de Tarefas -->
    <div class="card" style="display: flex; flex-direction: column; gap: 1rem;">
        <h3 style="margin: 0; font-size: 1.15rem; display: flex; align-items: center; gap: 0.5rem;">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            Checklist de Tarefas
        </h3>
        
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; font-size: 0.95rem;">
                <thead style="background: rgba(0,0,0,0.05);">
                    <tr>
                        <th style="text-align: center; padding: 0.75rem; width: 60px;">Ord</th>
                        <th style="text-align: left; padding: 0.75rem; width: 140px;">Sistema</th>
                        <th style="text-align: left; padding: 0.75rem;">Ação / Descrição</th>
                        <th style="text-align: center; padding: 0.75rem; width: 100px;">Req</th>
                        <th style="text-align: center; padding: 0.75rem; width: 130px;">Status</th>
                        <th style="text-align: right; padding: 0.75rem; width: 100px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-tarefas-body">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal de Execução de Tarefa -->
<div id="modal-executar-tarefa" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 500px; margin: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Atualizar Status da Tarefa</h3>
            <button class="btn-icon" type="button" id="btn-close-modal-tarefa"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <form id="formExecutarTarefa">
            <input type="hidden" id="tarefaIdInput">
            
            <div style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.03); border-radius: var(--radius-md);">
                <p id="tarefaTituloDisplay" style="margin: 0 0 0.5rem 0; font-weight: 600; font-size: 1.1rem;"></p>
                <p id="tarefaDescDisplay" style="margin: 0; color: var(--text-secondary); font-size: 0.9rem;"></p>
            </div>
            
            <div class="form-group">
                <label class="form-label">Status *</label>
                <select id="tarefaStatusInput" class="form-input" required>
                    <option value="PENDENTE">Pendente</option>
                    <option value="CONCLUIDA">Concluída</option>
                    <option value="N/A">Não Aplicável (N/A)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Observações / Anotações</label>
                <textarea id="tarefaObsInput" class="form-input" rows="3" placeholder="Informações relevantes sobre a execução..."></textarea>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" id="btn-cancel-modal-tarefa">Cancelar</button>
                <button type="submit" class="btn btn-inspecao" id="btnSalvarTarefa">Salvar Tarefa</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<meta name="inspecao-id" content="{{ inspecao_id }}">
<script src="/static/js/inspecao_detalhe.js?v=2"></script>
{% endblock %}
