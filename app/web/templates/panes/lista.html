{% extends "base.html" %}

{% block page_title %}PANES{% endblock %}

{% block content %}
<style>
    #panes-table-body tr {
        transition: background-color 0.2s ease;
    }
    #panes-table-body tr:hover {
        background-color: var(--bg-tertiary) !important;
        cursor: pointer;
    }
</style>
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <!-- Barra de Filtros Rápida -->
    <div style="display: flex; gap: 1rem; flex: 1; max-width: 700px;">
        <input type="text" id="filter-text" class="form-input" placeholder="Buscar por texto na descrição..." style="flex: 1;">
        <select id="filter-status" class="form-input" style="width: auto;">
            <option value="">TODOS STATUS</option>
            <option value="ABERTA" selected>ABERTA</option>
            <option value="RESOLVIDA">RESOLVIDA</option>
            <option value="EXCLUIDAS" data-role="ENCARREGADO">EXCLUIDAS (Lixeira)</option>
        </select>
    </div>

    <!-- Nova Pane -->
    <button class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
        Registrar Pane
    </button>
</div>

<!-- MODAL INTERMEDIÁRIO: Seleção de Aeronave (Grid Otimizado) -->
<div id="modal-selecao-aeronave" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 600px; margin: 1rem; max-height: 90vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Selecione a Aeronave</h3>
            <button class="btn-icon" id="btn-close-modal-selecao"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <div id="grid-aeronaves" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; padding: 0.5rem;">
            <!-- Ícones das aeronaves gerados via JS -->
            <p style="grid-column: span 5; text-align: center; color: var(--text-secondary);">Carregando frota ativa...</p>
        </div>
    </div>
</div>

<!-- Tabela de Panes -->
<div class="card glass-panel" style="padding: 0;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead style="background-color: var(--bg-tertiary); border-bottom: 1px solid var(--border-color);">
            <tr>
                <th style="padding: 1rem; font-weight: 600;">Aeronave</th>
                <th style="padding: 1rem; font-weight: 600;">Pane</th>
                <th style="padding: 1rem; font-weight: 600;">Status</th>
                <th style="padding: 1rem; font-weight: 600;">Responsavel</th>
                <th style="padding: 1rem; font-weight: 600; text-align: center;">Ação</th>
            </tr>
        </thead>
        <tbody id="panes-table-body">
            <tr><td colspan="5" style="padding: 2rem; text-align: center; color: var(--text-secondary);">Recuperando telemetria...</td></tr>
        </tbody>
    </table>
</div>

<!-- Custom Modal para Nova Pane (Escondido initially) -->
<div id="modal-nova-pane" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 500px; margin: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Nova Ocorrência</h3>
            <button class="btn-icon" id="btn-close-modal-nova-pane"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <form id="formNovaPane">
            <div class="form-group">
                <label class="form-label">Aeronave (Matrícula) *</label>
                <select id="aeronaveSelect" name="aeronave_id" class="form-input" required>
                    <option value="">Carregando frota...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Sistema / ATA (Opcional)</label>
                <input type="text" id="sistemaInput" name="sistema_subsistema" class="form-input" placeholder="Se souber, digite o sistema...">
            </div>

            <div class="form-group">
                <label class="form-label">Sintoma Constatado (Opcional)</label>
                <textarea id="descricaoInput" name="descricao" class="form-input" rows="3" placeholder="Detalhes do problema reportado..."></textarea>
            </div>

            <div class="form-group" data-role="ENCARREGADO">
                <label class="form-label">Responsável (Opcional)</label>
                <select id="mantenedorResponsavelSelect" name="mantenedor_responsavel_id" class="form-input">
                    <option value="">-- Não atribuir responsável --</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Evidência / Fotografia Inicial (Opcional)</label>
                <input type="file" id="fotoInput" name="arquivo" class="form-input" accept="image/*">
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" id="btn-cancelar-nova-pane">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btnSalvarPane">Cadastrar Pane</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal para Editar Pane -->
<div id="modal-editar-pane" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card glass-panel" style="width: 100%; max-width: 500px; margin: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0; font-size: 1.25rem;">Editar Ocorrência</h3>
            <button class="btn-icon" id="btn-close-modal-editar-pane"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>

        <form id="formEditarPane">
            <input type="hidden" id="editPaneId">
            <div class="form-group">
                <label class="form-label">Sistema / ATA</label>
                <input type="text" id="editSistemaInput" name="sistema_subsistema" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Descrição / Sintoma *</label>
                <textarea id="editDescricaoInput" name="descricao" class="form-input" rows="4" required></textarea>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" id="btn-cancelar-editar-pane">Cancelar</button>
                <button type="submit" class="btn btn-warning" id="btnAtualizarPane">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/panes_lista.js"></script>
{% endblock %}
